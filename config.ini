[serial]
# Symlink path that telescope software connects to
pty_symlink = /dev/ttyGS232
baud = 9600

[gpio]
# FUSE filesystem mount point
fuse_mount = /mnt/rp2040

# Pin assignments (GPIO numbers)
pin_az_enc = 26
pin_el_enc = 27
pin_cw     = 5
pin_ccw    = 4
pin_up     = 3
pin_dn     = 2

[calibration]
# All values are 12-bit ADC counts (0-4095)
# Original MicroPython used 16-bit read_u16() (0-65535); divide originals by 16
#
# Azimuth:  enc2az(enc) = (enc - az_min) * az_range_deg / (az_max - az_min)
az_min     = 1197
az_max     = 3950
az_min_ref = 1205
az_range   = 363.0

# Elevation: uses law-of-cosines for linear actuator
# el_raw = (4096 - enc) - el_flip_offset
# len    = el_raw * el_arm / (el_top - el_bot) + el_len_min
# ang    = acos((b^2 + c^2 - 60^2 - len^2) / (2*b*c))
# el     = 180 - 43 - 28 - ang_deg
el_flip_offset = 581
el_top         = 3515
el_bot         = 1283
el_arm         = 430.0
el_len_min     = 120.0
el_b           = 410.0
el_c           = 360.0
el_offset      = 109.0

[control]
# Position tolerance in degrees before motor stops
tolerance    = 0.4
# Control loop interval in seconds
loop_interval = 0.1
# Startup position targets (degrees)
default_az   = 180.0
default_el   = 20.0

[watchdog]
# Seconds between PING checks to the FUSE filesystem
ping_interval = 10
# Seconds to wait for FUSE response before declaring fault
ping_timeout  = 3
# Number of consecutive failures before attempting reconnect
max_failures  = 3
